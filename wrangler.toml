name = "simkl-mcp-sidgupta0504"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# generate generated/tools.ts before bundling — the directory is gitignored,
# so fresh checkouts (CI) must run codegen or the worker fails to build
[build]
command = "bun run codegen"

# kv namespace for oauth provider storage
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "4ed0a12eeaaa447dab7ccce128c87d96"
preview_id = "SIMKL_MCP"

# durable objects configuration for mcp agent
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SimklMCP"]

[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "SimklMCP"

# static assets configuration
[assets]
directory = "./static/"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = [ "!/", "/*", "!/index.html" ]

[vars]
SIMKL_API_BASE_URL = "https://api.simkl.com"
